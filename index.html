<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanvi Kulkarni</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            overflow: hidden;
        }

        /* Top and Bottom Electric Blue Accents */
        body::before, body::after {
            content: "";
            position: absolute;
            background-color: #00d2ff;
            box-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff;
            z-index: 10;
        }

        body::before {
            top: 0;
            left: 5%;
            width: 90%;
            height: 2px;
        }

        body::after {
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 2px;
        }

        /* Side Glowing Edge Bars */
        .edge-left-accent, .edge-right-accent {
            position: absolute;
            top: 20%;
            width: 2px;
            height: 60%;
            z-index: 10;
        }

        .edge-left-accent {
            left: 0;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            box-shadow: 0 0 10px #00d2ff;
        }

        .edge-right-accent {
            right: 0;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            box-shadow: 0 0 10px #00d2ff;
        }

        /* Main Content Block */
        .container {
            text-align: center;
            z-index: 5;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 60%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1rem;
            color: #8a8d93;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Streamlined Navigation Bar */
        nav {
            margin-top: 20px;
        }

        nav a {
            color: #b0b3b8;
            text-decoration: none;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 20px;
            padding-bottom: 6px;
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: 500;
        }

        nav a.active {
            color: #00d2ff;
            border-bottom: 2px solid #00d2ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            nav a { margin: 10px 5px; display: block; }
        }
    </style>
</head>
<body>

    <!-- Edge Accents -->
    <div class="edge-left-accent"></div>
    <div class="edge-right-accent"></div>

    <div class="container">
        <h1>Tanvi Kulkarni</h1>
        <p class="subtitle">Student &amp; Visual Creator</p>
        
        <!-- Heading Bar Menu -->
        <nav>
            <a href="index.html" class="active">About</a>
            <a href="research.html">Research</a>
        </nav>
    </div>

</body>
</html>
